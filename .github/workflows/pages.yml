name: Deploy Hugo site to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.2.1
        with:
          hugo-version: "0.164.0"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Install CSS tooling
        run: npm ci

      - name: Hugo version
        id: hugo-version
        run: echo "version=$(hugo version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Hugo resources
        uses: actions/cache@v6
        with:
          path: |
            resources/_gen
            ${{ runner.temp }}/hugo_cache
          key: ${{ runner.os }}-hugo-${{ steps.hugo-version.outputs.version }}-resources-${{ hashFiles('assets/**', 'config*.yml', 'config*.yaml', 'config*.toml', 'themes/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-${{ steps.hugo-version.outputs.version }}-resources-

      - name: Build
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: hugo --minify --config config_prod.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
