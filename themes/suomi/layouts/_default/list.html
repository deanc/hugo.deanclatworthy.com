{{ define "main" }}
<section class="listing-page page-width">
  <header class="page-heading">
    <p class="eyebrow">Archive</p>
    <h1>{{ .Title }}</h1>
    <p class="page-intro">{{ with .Description }}{{ . }}{{ else }}Browse all published articles.{{ end }}</p>
  </header>
  <div class="archive-list">
    {{ range (where .Pages "Draft" false) }}
    <a href="{{ .RelPermalink }}">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006" }}</time>
      <span>{{ .Title }}</span>
      <span aria-hidden="true">→</span>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
