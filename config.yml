BaseURL: ""
locale: "en-us"
title: "Hello. I'm Dean Clatworthy"
tagline:
uglyURLs: "true"
theme: [suomi, dean]
summaryLength: 25
enableGitInfo: true

frontmatter:
  lastmod:
    - lastmod
    - ":git"
    - date
    - publishDate

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: tokyonight-day

disableKinds: ["taxonomy"]

Params:
  SiteName: Dean Clatworthy
  TitleSuffix: Dean Clatworthy | Software Architect & Engineer
  MetaDescription: "Dean Clatworthy is a software architect and engineer in Helsinki, building dependable web services and thoughtful digital products."
  Tagline: "I build web services for a living. <code>Full-stack</code>, <code>Cloud</code>, <code>Databases</code>"
  Author:
    Name: Dean Clatworthy
    JobTitle: Software Architect & Engineer
    Location: Helsinki, Finland
  Social:
    Github: https://github.com/deanc
    Linkedin: https://www.linkedin.com/in/deanclatworthy/
    Twitter: https://x.com/deanclatworthy
  Homepage:
    Intro: |
      Greetings! I'm originally from England 🏴󠁧󠁢󠁥󠁮󠁧󠁿 but now I live in Helsinki, Finland 🇫🇮. I've a BSc. in Computer Science
      and I've been building things with computers now for as long as I can remember. I particularly enjoy building web applications -
      and I specialise in both back-end and front-end web application development in the cloud.
      I have a <a rel="noopener" target="_blank" href="https://github.com/deanc">Github profile</a>, where you can see some of my code. You can also reach me on
      <a rel="noopener" target="_blank" href="https://twitter.com/deanclatworthy">Twitter</a>, or fill in the <a href="/contact.html">contact form</a> and I'll try
      to mail you back.
  Comments:
    disqus:
      shortcode: "deanclatworthy"

permalinks:
  post: /:year/:month/:day/:slug/

menu:
  main:
      - Name: "Home"
        Pre: "<i class='fa fa-heart'></i>"
        Weight: 1
        Identifier: "home"
        URL: "/"

services:
  disqus:
    shortname: deanclatworthy

related:
  includeNewer: true
  threshold: 10
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 80
    - name: keywords
      weight: 60
